services:
  d2-mcp:
    build: .
    image: d2-mcp
    container_name: d2-mcp
    restart: unless-stopped
    # Credentials come from .env (BUNGIE_API_KEY, BUNGIE_CLIENT_ID, ...)
    env_file: .env
    environment:
      D2_MCP_DATA_DIR: /data
    ports:
      # Bound to loopback by default — the WebSocket transport has NO auth, and
      # stored OAuth tokens allow account writes, so do not expose it to the
      # network unless you mean to. Override D2_MCP_BIND=0.0.0.0 for LAN access.
      # D2_MCP_PORT changes the host port to avoid collisions.
      - "${D2_MCP_BIND:-127.0.0.1}:${D2_MCP_PORT:-3000}:3000"
    volumes:
      - d2-data:/data # tokens.json + SQLite manifest cache (~350MB)
    command: ["node", "dist/index.js", "websocket", "--port", "3000"]

volumes:
  d2-data:
